services:
  postgres:
    image: postgres:15-alpine
    container_name: quiverdm-postgres
    restart: unless-stopped
    ports:
      - "5433:5432"
    environment:
      POSTGRES_USER: quiverdm
      POSTGRES_PASSWORD: localdev
      POSTGRES_DB: quiverdm
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U quiverdm"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: quiverdm-redis
    restart: unless-stopped
    ports:
      - "6380:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  meilisearch:
    image: getmeili/meilisearch:v1.5
    container_name: quiverdm-meilisearch
    restart: unless-stopped
    ports:
      - "7701:7700"
    environment:
      MEILI_ENV: development
      MEILI_MASTER_KEY: masterKey
    volumes:
      - meilisearch_data:/meili_data

  ollama:
    image: ollama/ollama:latest
    container_name: quiverdm-ollama
    restart: unless-stopped
    ports:
      - "11434:11434"
    volumes:
      - ollama_data:/root/.ollama
    environment:
      - OLLAMA_HOST=0.0.0.0:11434
    healthcheck:
      test: ["CMD-SHELL", "ollama list || exit 0"]
      interval: 60s
      timeout: 30s
      retries: 3
      start_period: 60s
    deploy:
      resources:
        limits:
          memory: 8G
        reservations:
          memory: 4G

  n8n:
    image: n8nio/n8n:latest
    container_name: quiverdm-n8n
    restart: unless-stopped
    ports:
      - "5678:5678"
    environment:
      - N8N_BASIC_AUTH_ACTIVE=false
      - N8N_HOST=localhost
      - GENERIC_TIMEZONE=Australia/Sydney
      - N8N_SECURE_COOKIE=false
    volumes:
      - n8n_data:/home/node/.n8n
      - ./test-documents/makita-masters/transcriptions:/data/transcriptions
    depends_on:
      - postgres

  n8n-mcp:
    image: ghcr.io/czlonkowski/n8n-mcp/n8n-mcp:latest
    container_name: quiverdm-n8n-mcp
    restart: unless-stopped
    ports:
      - "3001:3000"
    environment:
      - N8N_API_URL=http://n8n:5678
      - N8N_API_KEY=${N8N_API_KEY}
      - MCP_MODE=http
      - AUTH_TOKEN=n8n-mcp-secret-token
    depends_on:
      - n8n

volumes:
  postgres_data:
  redis_data:
  meilisearch_data:
  ollama_data:
  n8n_data:
