name: Deploy

on:
  workflow_run:
    workflows: ["CI"]
    types: [completed]
    branches: [main]
  workflow_dispatch:
    inputs:
      environment:
        description: "Deployment environment"
        required: true
        default: "production"
        type: choice
        options:
          - production
          - staging

concurrency:
  group: deploy-${{ github.ref }}
  cancel-in-progress: false

jobs:
  # ---------------------------------------------------------------------------
  # Deploy worker to nerdt server (self-hosted runner, no Docker)
  # ---------------------------------------------------------------------------
  deploy:
    name: Deploy Worker
    runs-on: nerdt
    if: github.event.workflow_run.conclusion == 'success' || github.event_name == 'workflow_dispatch'
    environment: ${{ github.event.inputs.environment || 'production' }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.workflow_run.head_sha || github.sha }}

      - name: Install dependencies
        run: npm ci --omit=dev

      - name: Generate Prisma client
        run: npx prisma generate

      - name: Restart worker service
        run: sudo systemctl restart quiverdm-worker

      - name: Verify worker started
        run: sleep 3 && sudo systemctl status quiverdm-worker --no-pager

      - name: Deployment summary
        run: |
          echo "## Deployment Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "- **Commit:** \`${{ github.event.workflow_run.head_sha || github.sha }}\`" >> $GITHUB_STEP_SUMMARY
          echo "- **App:** Vercel (auto-deploy via git push)" >> $GITHUB_STEP_SUMMARY
          echo "- **Worker:** nerdt (self-hosted runner, systemd)" >> $GITHUB_STEP_SUMMARY
