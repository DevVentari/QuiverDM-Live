name: Deploy

on:
  workflow_run:
    workflows: ["CI"]
    types: [completed]
    branches: [main]
  workflow_dispatch:
    inputs:
      environment:
        description: "Deployment environment"
        required: true
        default: "production"
        type: choice
        options:
          - production
          - staging

concurrency:
  group: deploy-${{ github.ref }}
  cancel-in-progress: false

jobs:
  # ---------------------------------------------------------------------------
  # Deploy workers to Hetzner VPS (Docker)
  # Workers run as Docker containers alongside Docling on 204.168.157.125
  # ---------------------------------------------------------------------------
  deploy:
    name: Deploy Workers (Hetzner)
    runs-on: nerdt
    if: github.event.workflow_run.conclusion == 'success' || github.event_name == 'workflow_dispatch'
    environment: ${{ github.event.inputs.environment || 'production' }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.workflow_run.head_sha || github.sha }}

      - name: Sync source to Hetzner
        run: |
          rsync -az --delete \
            --include='src/***' \
            --include='prisma/***' \
            --include='deploy/***' \
            --include='package.json' \
            --include='package-lock.json' \
            --include='tsconfig.json' \
            --exclude='*' \
            ./ root@204.168.157.125:/opt/quiverdm/

      - name: Rebuild and restart workers
        run: |
          ssh root@204.168.157.125 'cd /opt/quiverdm && docker compose build workers && docker compose up -d --force-recreate workers'

      - name: Verify workers started
        run: |
          sleep 5
          ssh root@204.168.157.125 'docker ps --filter name=quiverdm-workers --format "{{.Status}}"'

      - name: Deployment summary
        run: |
          echo "## Deployment Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "- **Commit:** \`${{ github.event.workflow_run.head_sha || github.sha }}\`" >> $GITHUB_STEP_SUMMARY
          echo "- **App:** Vercel (auto-deploy via git push)" >> $GITHUB_STEP_SUMMARY
          echo "- **Workers:** Hetzner VPS Docker (204.168.157.125)" >> $GITHUB_STEP_SUMMARY
