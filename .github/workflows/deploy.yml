name: Deploy

on:
  workflow_run:
    workflows: ["CI"]
    types: [completed]
    branches: [main]
  workflow_dispatch:
    inputs:
      environment:
        description: "Deployment environment"
        required: true
        default: "production"
        type: choice
        options:
          - production
          - staging

concurrency:
  group: deploy-${{ github.ref }}
  cancel-in-progress: false

jobs:
  # ---------------------------------------------------------------------------
  # Deploy worker to nerdt server (self-hosted runner)
  # ---------------------------------------------------------------------------
  deploy:
    name: Deploy Worker
    runs-on: nerdt
    if: github.event.workflow_run.conclusion == 'success' || github.event_name == 'workflow_dispatch'
    environment: ${{ github.event.inputs.environment || 'production' }}
    permissions:
      contents: read
      packages: read

    steps:
      - name: Set image name
        id: image
        run: echo "name=ghcr.io/${GITHUB_REPOSITORY_OWNER,,}/quiverdm-live-worker:latest" >> $GITHUB_OUTPUT

      - name: Log in to GitHub Container Registry
        run: echo "${{ secrets.GITHUB_TOKEN }}" | docker login ghcr.io -u x-access-token --password-stdin

      - name: Pull latest worker image
        run: docker pull ${{ steps.image.outputs.name }}

      - name: Restart worker container
        run: |
          docker stop quiverdm-worker 2>/dev/null || true
          docker rm quiverdm-worker 2>/dev/null || true
          docker run -d \
            --name quiverdm-worker \
            --restart unless-stopped \
            --env-file /opt/quiverdm/worker.env \
            ${{ steps.image.outputs.name }}

      - name: Clean up old images
        run: docker image prune -f

      - name: Deployment summary
        run: |
          echo "## Deployment Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "- **Commit:** \`${{ github.event.workflow_run.head_sha || github.sha }}\`" >> $GITHUB_STEP_SUMMARY
          echo "- **App:** Vercel (auto-deploy via git push)" >> $GITHUB_STEP_SUMMARY
          echo "- **Worker:** nerdt (self-hosted runner) — \`${{ steps.image.outputs.name }}\`" >> $GITHUB_STEP_SUMMARY
