services:
  docling:
    image: quay.io/docling-project/docling-serve
    container_name: quiverdm-docling
    restart: unless-stopped
    ports:
      - "5001:5001"
    environment:
      - DOCLING_SERVE_CONCURRENCY=1
      - DOCLING_SERVE_MAX_SYNC_WAIT=600
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:5001/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 120s
    deploy:
      resources:
        limits:
          memory: 2560M

  workers:
    build:
      context: .
      dockerfile: Dockerfile.workers
    container_name: quiverdm-workers
    restart: unless-stopped
    env_file:
      - .env.production
    environment:
      - DOCLING_URL=http://docling:5001
      - NODE_OPTIONS=--max-old-space-size=1024
    depends_on:
      docling:
        condition: service_healthy
    deploy:
      resources:
        limits:
          memory: 1280M
