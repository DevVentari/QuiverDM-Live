services:
  workers:
    build:
      context: .
      dockerfile: Dockerfile.workers
    container_name: quiverdm-workers
    restart: unless-stopped
    env_file:
      - .env.production
    environment:
      - NODE_OPTIONS=--max-old-space-size=1536
      - TORCH_DEVICE=cpu
      - OMP_NUM_THREADS=2
      - MKL_NUM_THREADS=2
    volumes:
      - marker-models:/root/.cache/datalab
    deploy:
      resources:
        limits:
          memory: 9216M

volumes:
  marker-models:
